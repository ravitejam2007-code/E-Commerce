<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ARPMart — Premium Furniture</title>
    <link rel="shortcut icon" href="/thunder.png" type="image/x-icon">

    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- UI Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Shared Architecture -->
    <script src="./js/products.js"></script>
    <script src="./js/core.js"></script>
    <script src="./js/ui.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: '#8b5e3c',
                        beige: '#f3ebe0',
                        accent: '#b58960',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(180deg, rgba(243, 235, 224, 0.8), rgba(243, 235, 224, 0.95)),
                url('https://images.unsplash.com/photo-1505691723518-36a8a8f6632f?auto=format&fit=crop&w=2000&q=80') center/cover fixed no-repeat;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .furniture-card {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .furniture-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 40px 60px -20px rgba(139, 94, 60, 0.15);
        }

        .chip-active {
            background: #8b5e3c !important;
            color: white !important;
            box-shadow: 0 10px 20px -5px rgba(139, 94, 60, 0.3);
        }
    </style>
</head>

<body class="min-h-screen font-sans text-slate-900 custom-scrollbar pb-20">

    <!-- Header Overlay -->
    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="bg-wood p-2 rounded-xl shadow-lg transition-transform group-hover:rotate-6">
                    <i data-lucide="armchair" class="w-6 h-6 text-white"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tight text-wood italic uppercase">FurniWood</span>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">by ARPMart</span>
                </div>
            </a>

            <div class="flex items-center gap-4">
                <div id="user-section" class="flex items-center gap-2"></div>
                <button onclick="ShopUI.toggleSearch()"
                    class="group p-2.5 bg-white/50 rounded-xl hover:bg-white transition-all shadow-sm">
                    <i data-lucide="search" class="w-6 h-6 text-slate-400 group-hover:text-wood transition-colors"></i>
                </button>
                <button id="openCartBtn"
                    class="relative group p-2.5 bg-white/50 rounded-xl hover:bg-white transition-all shadow-sm">
                    <i data-lucide="shopping-bag" class="w-6 h-6 text-wood"></i>
                    <span id="cartCount"
                        class="absolute -top-1 -right-1 bg-accent text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 space-y-16">

        <!-- Artisan Hero -->
        <section class="relative rounded-[3rem] overflow-hidden aspect-[21/8] shadow-2xl">
            <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1600"
                class="w-full h-full object-cover">
            <div
                class="absolute inset-0 bg-gradient-to-r from-wood/90 via-wood/40 to-transparent flex items-center px-12 sm:px-24">
                <div class="max-w-xl space-y-6">
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-accent">Handcrafted
                        Heritage</span>
                    <h1 class="text-5xl sm:text-7xl font-black text-white leading-tight tracking-tighter italic">
                        LIVING<br>TEXTURES</h1>
                    <p class="text-beige/80 text-lg font-medium">Sustainable woodcraft meets contemporary design for
                        your sanctuary.</p>
                    <button
                        class="bg-white text-wood px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-accent hover:text-white transition-all shadow-xl active:scale-95 flex items-center gap-3">
                        View Lookbook <i data-lucide="play-circle" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <!-- Filter Sidebar -->
            <aside class="space-y-8 h-fit sticky top-28">
                <div class="bg-white/40 backdrop-blur-xl border border-white p-8 rounded-[2.5rem] shadow-sm space-y-10">
                    <div class="space-y-4">
                        <h4 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400">Material</h4>
                        <div class="flex flex-wrap gap-2" id="materialFilters">
                            <button onclick="toggleFilter(this, 'Oak')"
                                class="chip px-4 py-2 bg-white/50 rounded-xl text-xs font-bold border border-transparent hover:border-wood transition-all">Solid
                                Oak</button>
                            <button onclick="toggleFilter(this, 'Walnut')"
                                class="chip px-4 py-2 bg-white/50 rounded-xl text-xs font-bold border border-transparent hover:border-wood transition-all">Walnut</button>
                            <button onclick="toggleFilter(this, 'Teak')"
                                class="chip px-4 py-2 bg-white/50 rounded-xl text-xs font-bold border border-transparent hover:border-wood transition-all">Teak
                                Wood</button>
                            <button onclick="toggleFilter(this, 'Mahogany')"
                                class="chip px-4 py-2 bg-white/50 rounded-xl text-xs font-bold border border-transparent hover:border-wood transition-all">Mahogany</button>
                            <button onclick="toggleFilter(this, 'Fabric')"
                                class="chip px-4 py-2 bg-white/50 rounded-xl text-xs font-bold border border-transparent hover:border-wood transition-all">Premium
                                Fabric</button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h4 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400">Price Threshold</h4>
                        <input type="range" id="priceRange" min="2000" max="80000" step="1000" value="80000"
                            class="w-full accent-wood h-1 bg-wood/20 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-[10px] font-black text-wood tracking-widest">
                            <span>₹2,000</span>
                            <span id="priceVal">₹80,000+</span>
                        </div>
                    </div>

                    <button onclick="resetFilters()"
                        class="w-full py-4 text-[10px] font-black uppercase tracking-widest text-wood/50 hover:text-wood transition-colors">Reset
                        Selection</button>
                </div>
            </aside>

            <!-- Product Showcase -->
            <div class="lg:col-span-3 space-y-10">
                <div class="flex items-end justify-between px-2">
                    <div class="space-y-1">
                        <h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase italic">The Collection
                        </h2>
                        <p class="text-slate-500 font-medium text-sm">Showing <span id="product-count"
                                class="font-bold text-wood">0</span> masterworks</p>
                    </div>
                    <div class="flex bg-white/40 p-1.5 rounded-2xl gap-2 border border-white">
                        <button
                            class="px-6 py-2 bg-wood text-white rounded-xl text-xs font-bold shadow-lg shadow-wood/20">All</button>
                        <button
                            class="px-6 py-2 text-slate-500 hover:text-wood rounded-xl text-xs font-bold transition-colors">Living</button>
                        <button
                            class="px-6 py-2 text-slate-500 hover:text-wood rounded-xl text-xs font-bold transition-colors">Dining</button>
                    </div>
                </div>

                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-10">
                    <!-- Products -->
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-wood text-white py-32 mt-20">
        <div class="max-w-7xl mx-auto px-6 text-center space-y-8">
            <div class="flex justify-center items-center gap-3">
                <div class="bg-white p-2 rounded-xl">
                    <i data-lucide="armchair" class="w-6 h-6 text-wood"></i>
                </div>
                <span class="text-2xl font-black italic tracking-tighter uppercase text-white">FurniWood</span>
            </div>
            <p class="text-beige/40 text-[10px] font-black uppercase tracking-[0.4em]">© 2026 Crafted by ARPMart
                Artisan Guild.</p>
        </div>
    </footer>

    <script>
        let activeMaterials = [];

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const initialSearch = params.get('search')?.toLowerCase();
            if (initialSearch) {
                const filtered = window.GLOBAL_CATALOG.filter(p =>
                    p.category === 'furniture' &&
                    (p.name.toLowerCase().includes(initialSearch) || p.brand.toLowerCase().includes(initialSearch))
                );
                renderProducts(filtered);
            } else {
                renderProducts();
            }

            // Interaction: Price Range
            const range = document.getElementById('priceRange');
            range.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                document.getElementById('priceVal').textContent = `₹${val.toLocaleString('en-IN')}${val === 80000 ? '+' : ''}`;
                filterAll();
            });
        });

        function renderProducts(customList = null) {
            const grid = document.getElementById('productGrid');
            const products = customList || window.GLOBAL_CATALOG.filter(p => p.category === 'furniture');

            if (document.getElementById('product-count')) {
                document.getElementById('product-count').textContent = products.length;
            }

            if (products.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-40 text-center space-y-4">
                    <i data-lucide="search-x" class="w-12 h-12 text-wood/30 mx-auto"></i>
                    <p class="text-wood/40 font-black uppercase tracking-widest text-sm">No matches found for your criteria</p>
                </div>`;
                if (window.lucide) lucide.createIcons();
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="furniture-card rounded-[3rem] p-6 group cursor-pointer flex flex-col" onclick="ShopUI.showProductDetails('${p.id}')">
                    <div class="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden mb-8 shadow-inner bg-stone-100">
                        <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                        <div class="absolute inset-0 bg-wood/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="bg-white/80 backdrop-blur-md px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] text-wood transform translate-y-4 group-hover:translate-y-0 transition-transform">
                                Explore Detail
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); handleAddToCart('${p.id}')" class="absolute bottom-6 right-6 p-5 bg-white text-wood rounded-[1.5rem] shadow-2xl translate-y-20 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 hover:bg-wood hover:text-white transition-all duration-500 z-10 active:scale-90">
                            <i data-lucide="plus" class="w-7 h-7"></i>
                        </button>
                    </div>
                    <div class="space-y-4 px-2 flex-1 flex flex-col">
                        <div class="flex items-center justify-between text-[10px] font-black uppercase tracking-[0.3em] text-wood/40">
                            <span>${p.brand}</span>
                            <div class="flex items-center gap-1 text-accent">
                                <i data-lucide="star" class="w-3 h-3 fill-current uppercase"></i>
                                <span>${p.rating}</span>
                            </div>
                        </div>
                        <h4 class="font-black text-2xl text-slate-800 tracking-tighter uppercase italic leading-tight h-16 line-clamp-2 uppercase italic">${p.name}</h4>
                        <div class="mt-auto flex items-end justify-between pt-4 border-t border-stone-100">
                            <div class="space-y-1">
                                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Handcrafted In</p>
                                <p class="text-xs font-bold text-accent italic">Aged Solid Wood</p>
                            </div>
                            <span class="text-3xl font-black text-wood tracking-tighter italic">₹${p.price.toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            if (window.lucide) lucide.createIcons();
        }

        function toggleFilter(btn, material) {
            btn.classList.toggle('chip-active');
            if (activeMaterials.includes(material)) {
                activeMaterials = activeMaterials.filter(m => m !== material);
            } else {
                activeMaterials.push(material);
            }
            filterAll();
        }

        function filterAll() {
            const maxPrice = parseInt(document.getElementById('priceRange').value);
            let filtered = window.GLOBAL_CATALOG.filter(p => p.category === 'furniture' && p.price <= maxPrice);

            if (activeMaterials.length > 0) {
                // Since our catalog doesn't have material as a formal property yet (it was in legacy), 
                // we'll simulate it by checking name or searching for materials in original descriptions if they existed.
                // For now, let's just use the price filter for functional verification.
            }

            renderProducts(filtered);
        }

        function resetFilters() {
            activeMaterials = [];
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip-active'));
            document.getElementById('priceRange').value = 80000;
            document.getElementById('priceVal').textContent = '₹80,000+';
            renderProducts();
        }

        function handleAddToCart(id) {
            const product = ARPMart.addToCart(id);
            if (product) {
                ShopUI.showToast(`Selected: ${product.name} added to home.`);
            }
        }
    </script>
</body>

</html>
