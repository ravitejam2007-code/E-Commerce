<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ARPMart — Fresh Grocery Market</title>
    <link rel="shortcut icon" href="/thunder.png" type="image/x-icon">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- UI Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Shared Architecture -->
    <script src="./js/products.js"></script>
    <script src="./js/core.js"></script>
    <script src="./js/ui.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fresh: '#10b981', // emerald-500
                        market: '#1f55ad',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        .grocery-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .grocery-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(16, 185, 129, 0.15);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(16, 185, 129, 0.1);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans custom-scrollbar">

    <!-- Market Header -->
    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="bg-fresh p-2 rounded-xl shadow-lg shadow-fresh/20">
                    <i data-lucide="shopping-basket" class="w-6 h-6 text-white"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tight text-fresh uppercase">FreshMarket</span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">by ARPMart</span>
                </div>
            </a>

            <div class="flex items-center gap-4">
                <div id="user-section" class="flex items-center gap-4"></div>
                <button onclick="ShopUI.toggleSearch()"
                    class="group p-3 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-fresh transition-all">
                    <i data-lucide="search" class="w-5 h-5 text-slate-400 group-hover:text-fresh transition-colors"></i>
                </button>
                <button id="openCartBtn"
                    class="relative group p-3 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-fresh transition-all">
                    <i data-lucide="shopping-cart"
                        class="w-5 h-5 text-fresh group-hover:scale-110 transition-transform"></i>
                    <span id="cartCount"
                        class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 space-y-16">

        <!-- Fresh Banner -->
        <section class="relative rounded-[2.5rem] overflow-hidden aspect-[21/7] group">
            <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1600"
                class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
            <div
                class="absolute inset-0 bg-gradient-to-r from-emerald-900/80 via-emerald-900/40 to-transparent flex items-center px-12 sm:px-24">
                <div class="max-w-xl space-y-6">
                    <span
                        class="bg-white/10 backdrop-blur-md border border-white/20 text-white text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-[0.3em]">Farm
                        to Table</span>
                    <h1 class="text-4xl sm:text-7xl font-black text-white leading-tight tracking-tighter">
                        Purely<br>Organic.</h1>
                    <p class="text-emerald-50 text-lg font-medium">Daily essentials sourced directly from local
                        sustainable farms.</p>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center -space-x-3">
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-slate-200"></div>
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-slate-300"></div>
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-slate-400"></div>
                        </div>
                        <span class="text-white text-xs font-bold uppercase tracking-widest">+12k Happy Locals</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Product Market -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <!-- Market Filters -->
            <aside class="space-y-8">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-8">
                    <div class="space-y-4">
                        <h4 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400">Aisles</h4>
                        <nav class="flex flex-col gap-2">
                            <button onclick="filterAisle('all')"
                                class="aisle-btn active group flex items-center justify-between p-4 rounded-2xl bg-slate-50 border border-transparent hover:border-fresh transition-all">
                                <span
                                    class="text-sm font-black text-slate-600 group-hover:text-fresh transition-colors">Everything</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                            </button>
                            <button onclick="filterAisle('Vegetables')"
                                class="aisle-btn group flex items-center justify-between p-4 rounded-2xl bg-white hover:bg-slate-50 border border-transparent hover:border-fresh transition-all">
                                <span
                                    class="text-sm font-black text-slate-600 group-hover:text-fresh transition-colors">Vegetables</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                            </button>
                            <button onclick="filterAisle('Fruits')"
                                class="aisle-btn group flex items-center justify-between p-4 rounded-2xl bg-white hover:bg-slate-50 border border-transparent hover:border-fresh transition-all">
                                <span
                                    class="text-sm font-black text-slate-600 group-hover:text-fresh transition-colors">Fruits</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                            </button>
                            <button onclick="filterAisle('Bakery & Dairy')"
                                class="aisle-btn group flex items-center justify-between p-4 rounded-2xl bg-white hover:bg-slate-50 border border-transparent hover:border-fresh transition-all">
                                <span
                                    class="text-sm font-black text-slate-600 group-hover:text-fresh transition-colors">Bakery
                                    & Dairy</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                            </button>
                        </nav>
                    </div>

                    <div class="pt-4 border-t border-slate-50 space-y-4">
                        <div class="flex items-center gap-3">
                            <i data-lucide="truck" class="w-5 h-5 text-fresh"></i>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Express
                                Delivery Available</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Market Grid -->
            <div class="lg:col-span-3 space-y-10">
                <div class="flex items-end justify-between px-2">
                    <div class="space-y-1">
                        <h2 class="text-4xl font-black text-slate-900 tracking-tighter">Inside the Aisle</h2>
                        <p class="text-slate-400 font-medium text-sm">Picked fresh this morning.</p>
                    </div>
                    <div
                        class="flex items-center gap-2 bg-emerald-50 text-fresh px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest border border-emerald-100">
                        <span id="product-count">0</span> Items found
                    </div>
                </div>

                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
                    <!-- Products -->
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 py-24">
        <div class="max-w-7xl mx-auto px-6 text-center space-y-8">
            <div
                class="flex justify-center items-center gap-3 grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                <div class="bg-fresh p-2 rounded-xl">
                    <i data-lucide="shopping-basket" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-lg font-black tracking-tighter uppercase text-slate-900">FreshMarket</span>
            </div>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">© 2026 ARPMart Marketplace.
                Healthy Living.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const initialSearch = params.get('search')?.toLowerCase();
            if (initialSearch) {
                const filtered = window.GLOBAL_CATALOG.filter(p =>
                    p.category === 'grocery' &&
                    (p.name.toLowerCase().includes(initialSearch) || p.brand.toLowerCase().includes(initialSearch))
                );
                renderProducts(filtered);
            } else {
                renderProducts();
            }
        });

        function renderProducts(customList = null) {
            const grid = document.getElementById('productGrid');
            const products = customList || window.GLOBAL_CATALOG.filter(p => p.category === 'grocery');

            if (document.getElementById('product-count')) {
                document.getElementById('product-count').textContent = products.length;
            }

            if (products.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-40 text-center space-y-4">
                    <i data-lucide="grape" class="w-12 h-12 text-slate-200 mx-auto"></i>
                    <p class="text-slate-400 font-black uppercase tracking-widest text-xs">Aisle is currently empty</p>
                </div>`;
                if (window.lucide) lucide.createIcons();
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="grocery-card bg-white rounded-[2.5rem] p-6 border border-slate-100 group cursor-pointer flex flex-col" onclick="ShopUI.showProductDetails('${p.id}')">
                    <div class="relative aspect-square rounded-[2rem] overflow-hidden mb-6 bg-slate-50 border border-slate-50">
                        <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-fresh/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="bg-white/90 backdrop-blur-md px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-fresh transform translate-y-4 group-hover:translate-y-0 transition-transform">View Details</span>
                        </div>
                        <div class="absolute top-4 left-4">
                            <span class="bg-white/90 backdrop-blur-md text-[10px] font-black px-3 py-1.5 rounded-xl border border-slate-100 uppercase tracking-widest text-slate-600">Fresh Stock</span>
                        </div>
                    </div>
                    <div class="space-y-4 flex-1 flex flex-col">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-black text-xl text-slate-900 tracking-tight leading-tight mb-1 uppercase italic">${p.name}</h4>
                                <span class="text-[10px] font-black uppercase tracking-widest text-fresh">${p.brand}</span>
                            </div>
                            <span class="text-2xl font-black text-slate-900 tracking-tighter italic">₹${p.price.toLocaleString('en-IN')}</span>
                        </div>
                        <div class="mt-auto flex items-center justify-between pt-4 border-t border-slate-50">
                             <div class="flex items-center gap-1.5">
                                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">In Stock</span>
                            </div>
                            <button onclick="event.stopPropagation(); handleAddToCart('${p.id}')" class="flex items-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-fresh transition-all active:scale-95 shadow-lg shadow-slate-900/10 z-10">
                                <i data-lucide="plus" class="w-4 h-4"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            if (window.lucide) lucide.createIcons();
        }

        function filterAisle(aisle) {
            document.querySelectorAll('.aisle-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-slate-50', 'border-fresh');
                btn.classList.add('bg-white');
            });
            event.currentTarget.classList.add('active', 'bg-slate-50', 'border-fresh');

            const filtered = aisle === 'all'
                ? window.GLOBAL_CATALOG.filter(p => p.category === 'grocery')
                : window.GLOBAL_CATALOG.filter(p => p.category === 'grocery' && (p.name.includes(aisle) || p.brand.includes(aisle)));

            renderProducts(filtered);
        }

        function handleAddToCart(id) {
            const product = ARPMart.addToCart(id);
            if (product) {
                ShopUI.showToast(`Packed! ${product.name} added to cart.`);
            }
        }
    </script>
</body>

</html>
