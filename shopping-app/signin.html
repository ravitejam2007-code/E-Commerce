<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPMart - Sign In / Register</title>
    <link rel="shortcut icon" href="/thunder.png" type="image/x-icon">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- UI Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Shared Architecture -->
    <script src="./js/products.js"></script>
    <script src="./js/core.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1f55ad',
                        secondary: '#FF5722'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .auth-input {
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            box-shadow: 0 0 0 4px rgba(31, 85, 173, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .hidden-form {
            display: none;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Background Decoration -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-indigo-500/5 blur-[100px]"></div>
    </div>

    <div class="glass-panel w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 sm:p-12 relative z-10 animate-fade-in">

        <!-- Header -->
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center justify-center gap-3 mb-6">
                <div class="bg-primary p-3 rounded-2xl shadow-lg shadow-primary/20">
                    <i data-lucide="zap" class="w-8 h-8 text-white fill-white"></i>
                </div>
            </a>
            <h1 id="authTitle" class="text-3xl font-black tracking-tight text-slate-900 uppercase">Welcome Back</h1>
            <p id="authSubtitle" class="text-slate-500 font-medium mt-2">Sign in to your ARPMart account</p>
        </div>

        <!-- Sign In Form -->
        <form id="signinForm" class="space-y-6" onsubmit="handleLogin(event)">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="email" id="signinEmail" required placeholder="name@example.com"
                        class="auth-input w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold text-sm outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Password</label>
                    <a href="#" class="text-[10px] font-black uppercase text-primary hover:underline">Forgot?</a>
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" id="signinPassword" required placeholder="••••••••"
                        class="auth-input w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold text-sm outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-primary transition-all shadow-lg shadow-primary/10 active:scale-[0.98]">
                Sign In
            </button>
        </form>

        <!-- Create Account Form -->
        <form id="signupForm" class="space-y-6 hidden-form" onsubmit="handleSignup(event)">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Full Name</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="text" id="signupName" required placeholder="John Doe"
                        class="auth-input w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold text-sm outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="email" id="signupEmail" required placeholder="name@example.com"
                        class="auth-input w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold text-sm outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" id="signupPassword" required placeholder="••••••••"
                        class="auth-input w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold text-sm outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-primary transition-all shadow-lg shadow-primary/10 active:scale-[0.98]">
                Create Account
            </button>
        </form>

        <!-- Toggle Auth Mode -->
        <div class="mt-8 text-center" id="toggleAuthContainer">
            <p class="text-sm font-bold text-slate-500" id="toggleAuthText">
                New to ARPMart? <a href="#" onclick="toggleAuthMode(event)" class="text-primary hover:underline">Create
                    an account</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let isLoginMode = true;

        function toggleAuthMode(e) {
            e.preventDefault();
            isLoginMode = !isLoginMode;

            const signinForm = document.getElementById('signinForm');
            const signupForm = document.getElementById('signupForm');
            const authTitle = document.getElementById('authTitle');
            const authSubtitle = document.getElementById('authSubtitle');
            const toggleAuthText = document.getElementById('toggleAuthText');

            if (isLoginMode) {
                signinForm.classList.remove('hidden-form');
                signupForm.classList.add('hidden-form');
                authTitle.textContent = 'Welcome Back';
                authSubtitle.textContent = 'Sign in to your ARPMart account';
                toggleAuthText.innerHTML = 'New to ARPMart? <a href="#" onclick="toggleAuthMode(event)" class="text-primary hover:underline">Create an account</a>';
                document.title = 'ARPMart - Sign In';
            } else {
                signinForm.classList.add('hidden-form');
                signupForm.classList.remove('hidden-form');
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Join the ARPMart premium marketplace';
                toggleAuthText.innerHTML = 'Already have an account? <a href="#" onclick="toggleAuthMode(event)" class="text-primary hover:underline">Sign in</a>';
                document.title = 'ARPMart - Register';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('signinEmail').value;
            // Generate a fake name from email for demo purposes
            const name = email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1);

            ARPMart.login(email, name);

            // Redirect back to home
            window.location.href = 'index.html';
        }

        function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const name = document.getElementById('signupName').value;

            ARPMart.login(email, name);

            // Redirect back to home
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
